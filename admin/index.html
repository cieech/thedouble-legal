<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Double Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --canvas:#F6F3ED;--sidebar-bg:#F1EDE3;--sidebar-w:232px;
  --border:#E3DCCF;--text:#211E1A;--text2:#57514A;--text3:#8A8177;
  --teal:#1F6E66;--teal-deep:#14524C;--teal-field:#DCE9E6;
  --positive:#2E7D4F;--caution:#9A6B2F;--critical:#A44A3D;
  --mono:ui-monospace,Menlo,monospace;
  --ui:system-ui,-apple-system,"SF Pro","Roboto Flex",sans-serif;
  --card-bg:#FCFAF5;--recessed:#EDE8DE;
  --elevation1:0 1px 2px rgba(33,30,26,.06),0 4px 16px rgba(33,30,26,.06);
}
body{background:var(--canvas);color:var(--text);font-family:var(--ui);font-size:14px;line-height:1.5;min-height:100vh;display:flex}

/* SIDEBAR */
#sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;padding:0 12px 24px}
#wordmark{display:flex;align-items:center;gap:10px;padding:20px 4px 24px;font-size:15px;font-weight:600;color:var(--teal-deep)}
#wordmark svg{flex-shrink:0}
nav a{display:flex;align-items:center;height:36px;padding:0 10px;border-radius:8px;text-decoration:none;color:var(--text2);font-size:13px;cursor:pointer;transition:background 120ms}
nav a:hover{background:var(--recessed)}
nav a.active{background:var(--teal-field);color:var(--teal-deep);font-weight:600}
#user-info{margin-top:auto;padding:12px 4px 0;font-size:12px;color:var(--text3);word-break:break-all}
#signout-btn{margin-top:8px;background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;color:var(--text2);width:100%}
#signout-btn:hover{background:var(--recessed)}

/* MAIN */
#main{flex:1;max-width:calc(1440px - var(--sidebar-w));padding:32px 40px;overflow-x:auto}
h1{font-size:18px;font-weight:600;margin-bottom:24px;color:var(--text)}
h2{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:12px;font-family:var(--mono)}

/* STAT CARDS */
.cards{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:32px}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:20px 24px;min-width:148px;box-shadow:var(--elevation1)}
.card-label{font-size:12px;color:var(--text3);font-weight:500;margin-bottom:6px}
.card-value{font-size:26px;font-weight:600;color:var(--text);font-family:var(--mono)}
.card-delta{font-size:12px;color:var(--text3);margin-top:4px}

/* TABLES */
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:10px;background:var(--card-bg)}
table{width:100%;border-collapse:collapse}
thead th{background:var(--sidebar-bg);font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--recessed)}
tbody td{font-size:13px;padding:0 14px;height:40px;color:var(--text);vertical-align:middle}
td.mono{font-family:var(--mono);font-size:12px}
td.dim{color:var(--text3);font-size:12px}

/* TRUST DOTS */
.dot{display:inline-flex;align-items:center;gap:6px;font-size:12px}
.dot::before{content:'';display:inline-block;width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot.positive{color:var(--positive)}.dot.positive::before{background:var(--positive)}
.dot.caution{color:var(--caution)}.dot.caution::before{background:var(--caution)}
.dot.critical{color:var(--critical)}.dot.critical::before{background:var(--critical)}
.dot.neutral{color:var(--text3)}.dot.neutral::before{background:var(--text3)}

/* BUTTONS */
.btn{border:none;border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;font-family:var(--ui);font-weight:500;transition:opacity 120ms}
.btn:hover{opacity:.85}
.btn-primary{background:var(--teal);color:#fff}
.btn-ghost{background:var(--recessed);color:var(--text2)}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--canvas);display:flex;align-items:center;justify-content:center;z-index:100}
#login-box{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:40px;width:360px;box-shadow:var(--elevation1)}
#login-box h1{margin-bottom:6px}
#login-box p{font-size:13px;color:var(--text3);margin-bottom:24px}
#login-email{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;font-family:var(--ui);outline:none;background:#fff;margin-bottom:12px}
#login-email:focus{border-color:var(--teal)}
#login-msg{margin-top:12px;font-size:13px;color:var(--text3)}

/* NOTICES */
.notice{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px}
.notice.warn{background:#FFF3DC;color:var(--caution);border:1px solid #E5C882}
.notice.err{background:#FDE8E5;color:var(--critical);border:1px solid #D98B82}
.notice.ok{background:#E5F3EC;color:var(--positive);border:1px solid #8DBBA1}

/* TRANSCRIPT */
#transcript-panel{margin-top:24px}
.msg-row{padding:8px 0;border-bottom:1px solid var(--border)}
.msg-row:last-child{border-bottom:none}
.msg-speaker{font-size:11px;font-weight:600;color:var(--text3);margin-bottom:2px;font-family:var(--mono);text-transform:uppercase}
.msg-text{font-size:13px;color:var(--text)}

.loading{color:var(--text3);font-size:13px;padding:16px 0}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" style="display:none">
  <div id="login-box">
    <h1>Double Admin</h1>
    <p>Enter your email to receive a magic link.</p>
    <input id="login-email" type="email" placeholder="voytek@thedouble.app" autocomplete="email">
    <button class="btn btn-primary" style="width:100%" onclick="sendMagicLink()">Send magic link</button>
    <div id="login-msg"></div>
  </div>
</div>

<!-- APP SHELL -->
<div id="app-shell" style="display:none">
  <div id="sidebar">
    <div id="wordmark">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 64" width="32" height="21">
        <defs>
            <clipPath id="lens"><circle cx="36" cy="32" r="26"/></clipPath>
            <mask id="lens-outL"><rect width="96" height="64" fill="white"/><circle cx="60" cy="32" r="26" fill="black"/></mask>
            <mask id="lens-outR"><rect width="96" height="64" fill="white"/><circle cx="36" cy="32" r="26" fill="black"/></mask>
          </defs>
          <circle cx="60" cy="32" r="26" fill="#1F6E66" clip-path="url(#lens)"/>
          <circle cx="36" cy="32" r="25.2" fill="none" stroke="#C9C1B3" stroke-width="1.6" mask="url(#lens-outL)"/>
          <circle cx="60" cy="32" r="25.2" fill="none" stroke="#C9C1B3" stroke-width="1.6" mask="url(#lens-outR)"/>
      </svg>
      Admin
    </div>
    <nav>
      <a data-section="overview" onclick="nav(this)">Overview</a>
      <a data-section="outcomes" onclick="nav(this)">Outcomes</a>
      <a data-section="users" onclick="nav(this)">Users</a>
      <a data-section="candidates" onclick="nav(this)">Value Engine</a>
      <a data-section="reports" onclick="nav(this)">Reports</a>
      <a data-section="health" onclick="nav(this)">Doubles health</a>
      <a data-section="conversations" onclick="nav(this)">Conversations</a>
      <a data-section="config" onclick="nav(this)">Tuning</a>
      <a data-section="runs" onclick="nav(this)">Runs</a>
      <a data-section="funnels" onclick="nav(this)">Funnels</a>
      <a data-section="memories" onclick="nav(this)">Memory</a>
      <a data-section="relationships" onclick="nav(this)">Relationships</a>
    </nav>
    <div id="user-info"></div>
    <button id="signout-btn" onclick="signOut()">Sign out</button>
  </div>
  <div id="main">
    <div id="content"><div class="loading">Select a section from the sidebar.</div></div>
  </div>
</div>

<script>
var SUPABASE_URL = "https://vdpgexbrvtygdkffznog.supabase.co";
var ANON_KEY = "sb_publishable_Q0ZpzV-aZn6Gv2tR6KhAZw_jz7wM49W";
var API_URL = "https://vdpgexbrvtygdkffznog.supabase.co/functions/v1/admin-api";

var sb = supabase.createClient(SUPABASE_URL, ANON_KEY);
var session = null;

async function init() {
  var hash = window.location.hash;
  if (hash.includes("access_token=")) {
    var r = await sb.auth.getSession();
    if (r.data && r.data.session) {
      session = r.data.session;
      window.history.replaceState(null, "", window.location.pathname);
    }
  } else {
    var r2 = await sb.auth.getSession();
    session = (r2.data && r2.data.session) ? r2.data.session : null;
  }
  if (!session) { showLogin(); } else { showApp(); }
}

function showLogin() {
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("app-shell").style.display = "none";
}

function showApp() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app-shell").style.display = "flex";
  document.getElementById("user-info").textContent = session.user ? session.user.email : "";
  var first = document.querySelector("nav a[data-section='overview']");
  if (first) nav(first);
}

async function sendMagicLink() {
  var email = document.getElementById("login-email").value.trim();
  var msg = document.getElementById("login-msg");
  if (!email) { msg.textContent = "Enter your email."; return; }
  msg.textContent = "Sending...";
  var r = await sb.auth.signInWithOtp({ email: email, options: { emailRedirectTo: 'https://thedouble.app/admin/' } });
  if (r.error) { msg.textContent = "Error: " + r.error.message; }
  else { msg.textContent = "Check your inbox for the magic link."; }
}

async function signOut() {
  await sb.auth.signOut();
  session = null;
  showLogin();
}

function nav(el) {
  document.querySelectorAll("nav a").forEach(function(a) { a.classList.remove("active"); });
  el.classList.add("active");
  loadSection(el.dataset.section);
}

async function apiFetch(params, opts) {
  opts = opts || {};
  var url = new URL(API_URL);
  Object.keys(params).forEach(function(k) { url.searchParams.set(k, params[k]); });
  var res = await fetch(url.toString(), {
    method: opts.method || "GET",
    headers: {
      "Authorization": "Bearer " + session.access_token,
      "Content-Type": "application/json"
    },
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (res.status === 403) throw new Error("not_authorized");
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function loadSection(section) {
  var content = document.getElementById("content");
  content.innerHTML = '<div class="loading">Loading...</div>';
  try {
    var params = { section: section };
    if (section === "runs" && runsFilter) params.fn = runsFilter;
    if (section === "memories") {
      if (memFilters.user) params.user = memFilters.user;
      if (memFilters.kind) params.kind = memFilters.kind;
      if (memFilters.q) params.q = memFilters.q;
    }
    if (section === "outcomes") {
      Object.keys(outcomeFilters).forEach(function(k) {
        if (outcomeFilters[k]) params[k] = outcomeFilters[k];
      });
    }
    var data = await apiFetch(params);
    if (section === "overview") content.innerHTML = renderOverview(data);
    else if (section === "outcomes") content.innerHTML = renderOutcomes(data);
    else if (section === "users") content.innerHTML = renderUsers(data);
    else if (section === "candidates") content.innerHTML = renderCandidates(data);
    else if (section === "reports") content.innerHTML = renderReports(data);
    else if (section === "health") content.innerHTML = renderHealth(data);
    else if (section === "conversations") content.innerHTML = renderConversations(data);
    else if (section === "config") content.innerHTML = renderConfig(data);
    else if (section === "runs") content.innerHTML = renderRuns(data);
    else if (section === "funnels") content.innerHTML = renderFunnels(data);
    else if (section === "memories") content.innerHTML = renderMemories(data);
    else if (section === "relationships") content.innerHTML = renderRelationships(data);
  } catch(e) {
    if (e.message === "not_authorized") {
      content.innerHTML = '<div class="notice err">Not authorized. Your account is not on the admin allowlist.</div>';
    } else {
      content.innerHTML = '<div class="notice err">Error: ' + esc(e.message) + '</div>';
    }
  }
}

function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function relTime(iso) {
  if (!iso) return "never";
  var d = Date.now() - new Date(iso).getTime();
  var h = Math.round(d / 3600000);
  if (h < 1) return "just now";
  if (h < 24) return h + "h ago";
  return Math.round(h / 24) + "d ago";
}

function dot(status, label) {
  var cls = status === "positive" ? "positive" : status === "caution" ? "caution" : status === "critical" ? "critical" : "neutral";
  return '<span class="dot ' + cls + '">' + esc(label) + '</span>';
}

// OVERVIEW
// ADM-02: overview sources arrive as {ok, data, error} envelopes —
// an errored source renders as an error notice + dashes, never as zero.
function renderOverview(d) {
  var mB = d.metrics || {};
  var eB = d.engagement || {};
  var hB = d.health || {};
  var ocB = d.outcomes || {};
  var prov = d.spend_provenance || {};
  var m = (mB.ok && mB.data) ? mB.data : {};
  var oc = (ocB.ok && ocB.data) ? ocB.data : {};
  var health = (hB.ok && hB.data) ? hB.data : [];
  var spendOk = prov.ok !== false;

  var html = '<h1>Overview</h1>';
  [["metrics", mB], ["engagement", eB], ["cron health", hB], ["outcomes", ocB]].forEach(function(p) {
    if (p[1].ok === false) {
      html += '<div class="notice err">Source error (' + esc(p[0]) + '): ' + esc(p[1].error || 'unknown') + '</div>';
    }
  });
  if (!spendOk) html += '<div class="notice err">Source error (llm_usage / spend): ' + esc(prov.error || 'unknown') + '</div>';

  var mv = function(x) { return mB.ok === false ? "—" : (x || 0); };
  var cards = [
    { label: "Real users", value: mv(m.total_users), delta: mB.ok === false ? "source error" : "+" + (m.new_users_7d || 0) + " this week" },
    { label: "Active today", value: mv(m.active_today), delta: mB.ok === false ? "source error" : (m.messages_today || 0) + " messages" },
    { label: "D2D conversations", value: mv(m.d2d_conversations_7d), delta: "last 7 days" },
    { label: "Reflect runs", value: mv(m.reflect_runs_7d), delta: "last 7 days" },
    { label: "Waitlist", value: d.waitlist_count == null ? "—" : d.waitlist_count, delta: "signups" },
    { label: "Spend today", value: spendOk ? "$" + (d.spend_today_usd || 0).toFixed(4) : "—",
      delta: spendOk ? "$" + (d.spend_7d_usd || 0).toFixed(3) + " / 7d · estymowane" : "source error" }
  ];
  html += '<div class="cards">';
  cards.forEach(function(c) {
    html += '<div class="card"><div class="card-label">' + esc(c.label) + '</div>'
      + '<div class="card-value">' + esc(String(c.value)) + '</div>'
      + '<div class="card-delta">' + esc(c.delta) + '</div></div>';
  });
  html += '</div>';

  if (ocB.ok !== false) {
    html += '<h2>Outcomes &amp; activation</h2><div class="cards">';
    var pct = function(v) { return Math.round((v || 0) * 100) + "%"; };
    var mix = oc.origin_mix || {};
    var mixStr = Object.keys(mix).map(function(k) { return k + " " + mix[k]; }).join(" · ") || "none yet";
    [
      { label: "RO / WAU (7d)", value: oc.ro_wau != null ? oc.ro_wau : 0, delta: (oc.realized_7d || 0) + " realized / " + (oc.wau || 0) + " WAU" },
      { label: "Activation rate", value: pct(oc.activation_rate), delta: "3 outcomes in 14d" },
      { label: "Enhanced rate", value: pct(oc.enhanced_rate), delta: "incl. network outcome" },
      { label: "Reversal rate", value: pct(oc.reversal_rate), delta: (oc.harmful_count || 0) + " harmful" },
      { label: "Origin mix", value: "", delta: mixStr }
    ].forEach(function(c) {
      html += '<div class="card"><div class="card-label">' + esc(c.label) + '</div>'
        + '<div class="card-value">' + esc(String(c.value)) + '</div>'
        + '<div class="card-delta">' + esc(c.delta) + '</div></div>';
    });
    html += '</div>';
  }

  // ADM-17 / H3: per-purpose spend readout, always labeled estymowane.
  var byPurpose = d.spend_7d_by_purpose || [];
  if (spendOk && byPurpose.length) {
    html += '<h2>Spend by purpose — 7d (estymowane)</h2><div class="tbl-wrap"><table>'
      + '<thead><tr><th>Purpose</th><th>Calls</th><th>USD (est.)</th><th>Pricing</th></tr></thead><tbody>';
    byPurpose.forEach(function(p) {
      var pricing = p.unknown_model_calls > 0
        ? p.unknown_model_calls + " calls priced as sonnet fallback"
        : "price table";
      html += '<tr><td class="mono">' + esc(p.purpose) + '</td>'
        + '<td class="mono">' + p.calls + '</td>'
        + '<td class="mono">$' + (p.usd || 0).toFixed(4) + '</td>'
        + '<td class="dim">' + esc(pricing) + '</td></tr>';
    });
    html += '</tbody></table></div>';
    if (prov.basis) html += '<div class="card-delta" style="margin:6px 0 24px">Basis: ' + esc(prov.basis) + '</div>';
    else html += '<div style="margin-bottom:24px"></div>';
  }

  var ca = d.canary || {};
  var canaryClass = ca.status === "positive" ? "ok" : ca.status === "caution" ? "warn" : "err";
  html += '<h2>Credits canary</h2>'
    + '<div class="notice ' + canaryClass + '">'
    + dot(ca.status, ca.status || "no data") + ' '
    + (ca.error
      ? 'Source error: ' + esc(ca.error)
      : 'Last successful LLM call: ' + relTime(ca.newest_success_at)
        + (ca.newest_failed_at ? ' &middot; Last refused: ' + relTime(ca.newest_failed_at) : ''))
    + '</div>';

  if (hB.ok !== false && health.length) {
    html += '<h2 style="margin-top:24px">Cron health (last 20 runs)</h2><div class="tbl-wrap"><table>'
      + '<thead><tr><th>Job</th><th>Status</th><th>Started</th></tr></thead><tbody>';
    health.forEach(function(h) {
      var st = h.status === "succeeded" ? "positive" : h.status === "running" ? "caution" : "critical";
      html += '<tr><td class="mono">' + esc(h.jobname) + '</td>'
        + '<td>' + dot(st, h.status) + '</td>'
        + '<td class="dim">' + relTime(h.start_time) + '</td></tr>';
    });
    html += '</tbody></table></div>';
  }
  return html;
}

// OUTCOMES (3.0 O6: Outcome Explorer)
var outcomeFilters = { status: "", origin: "" };

function setOutcomeFilter(key, value) {
  outcomeFilters[key] = value;
  loadSection("outcomes");
}

function renderOutcomes(d) {
  var rows = d.outcomes || [];
  var statuses = ["", "detected", "probable", "realized", "durable", "failed", "reversed", "harmful"];
  var origins = ["", "personal", "relationship", "network", "serendipity"];
  var sel = function(key, opts, current) {
    var h = '<select onchange="setOutcomeFilter(' + "'" + key + "'" + ', this.value)" style="border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:13px;background:var(--card-bg);margin-right:8px">';
    opts.forEach(function(o) {
      h += '<option value="' + o + '"' + (o === current ? ' selected' : '') + '>' + (o || 'all ' + key) + '</option>';
    });
    return h + '</select>';
  };
  var html = '<h1>Outcomes</h1>'
    + '<div style="margin-bottom:16px">' + sel("status", statuses, outcomeFilters.status) + sel("origin", origins, outcomeFilters.origin)
    + '<span class="card-delta">' + rows.length + ' outcomes (newest 200)</span></div>'
    + '<div class="tbl-wrap"><table>'
    + '<thead><tr><th>User</th><th>Status</th><th>Origin</th><th>Category</th><th>Summary</th><th>Loop</th><th>Conf</th><th>Imp</th><th>Contrib</th><th>Evidence</th><th>Src</th><th>Created</th><th>Actions</th></tr></thead><tbody>';
  rows.forEach(function(o) {
    var st = (o.status === "realized" || o.status === "durable") ? "positive"
      : (o.status === "probable" || o.status === "detected") ? "caution"
      : "critical";
    var actions = '';
    var mk = function(action, label) {
      return '<button class="btn btn-ghost" style="padding:3px 8px;font-size:11px;margin-right:4px" '
        + 'onclick="outcomeAction(' + "'" + esc(o.id) + "','" + action + "'" + ')">' + label + '</button>';
    };
    if (o.status === "probable" || o.status === "detected") actions += mk("realize", "Realize") + mk("fail", "Fail");
    if (o.status === "realized" || o.status === "durable") actions += mk("reverse", "Reverse") + mk("harmful", "Harmful");
    if (o.status === "failed" || o.status === "reversed" || o.status === "harmful") actions += mk("restore_probable", "Restore");
    html += '<tr>'
      + '<td>' + esc(o.user_name || o.user_id.slice(0, 8))
        + (o.user_tag ? ' <span style="color:var(--text3);font-size:11px">' + esc(o.user_tag) + '</span>' : '') + '</td>'
      + '<td>' + dot(st, o.status) + (o.status_source === "manual" ? ' <span style="color:var(--text3);font-size:10px">manual</span>' : '') + '</td>'
      + '<td class="mono">' + esc(o.origin) + '</td>'
      + '<td class="mono">' + esc(o.category) + '</td>'
      + '<td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + esc(o.summary) + '">' + esc(o.summary) + '</td>'
      + '<td class="dim" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + esc(o.loop) + '">' + esc(o.loop || '-') + '</td>'
      + '<td class="mono">' + (o.confidence != null ? Math.round(o.confidence * 100) / 100 : '-') + '</td>'
      + '<td class="mono">' + (o.importance != null ? o.importance : '-') + '</td>'
      + '<td class="mono">' + (o.double_contribution != null ? Math.round(o.double_contribution * 100) / 100 : '-') + '</td>'
      + '<td class="dim" style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + esc(o.evidence) + '">'
        + (o.evidence_level ? '[' + esc(o.evidence_level) + '] ' : '') + esc(o.evidence || '') + '</td>'
      + '<td class="mono">' + esc(o.status_source) + '</td>'
      + '<td class="dim">' + relTime(o.created_at) + '</td>'
      + '<td style="white-space:nowrap">' + actions + '</td>'
      + '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

async function outcomeAction(id, action) {
  try {
    await apiFetch({ section: "outcomes" }, { method: "POST", body: { id: id, action: action } });
    loadSection("outcomes");
  } catch(e) {
    alert("Error: " + e.message);
  }
}

// USERS (3.0 O6: User Explorer light)
function renderUsers(d) {
  var rows = d.users || [];
  var stateDot = function(state) {
    var st = (state === "activated" || state === "enhanced" || state === "retained") ? "positive"
      : (state === "new" || state === "learning") ? "caution"
      : (state === "at_risk" || state === "weakening" || state === "dormant") ? "critical"
      : "neutral";
    return dot(st, state);
  };
  var html = '<h1>Users</h1>'
    + '<div class="tbl-wrap"><table>'
    + '<thead><tr><th>User</th><th>Days</th><th>State</th><th>Bucket</th><th>Progress</th><th>Network</th><th>Open loops</th><th>Recent outcomes</th><th>Recommended action</th></tr></thead><tbody>';
  rows.forEach(function(u) {
    var ra = u.recommended_action || {};
    var listCell = function(items) {
      if (!items || !items.length) return '<span class="dim">-</span>';
      return items.map(function(x) {
        return '<div style="font-size:12px;padding:2px 0;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + esc(x) + '">' + esc(x) + '</div>';
      }).join('');
    };
    html += '<tr>'
      + '<td>' + esc(u.name || u.user_id.slice(0, 8))
        + (u.tag ? ' <span style="color:var(--text3);font-size:11px">' + esc(u.tag) + '</span>' : '')
        + '<div class="dim" style="font-size:11px">' + esc(u.phone) + '</div></td>'
      + '<td class="mono">' + u.days_since_signup + '</td>'
      + '<td>' + stateDot(u.lifecycle_state) + '</td>'
      + '<td class="mono">' + esc(u.bucket) + '</td>'
      + '<td class="mono">' + esc(u.activation_progress) + (u.meaningful_context ? '' : ' <span style="color:var(--critical);font-size:10px">no ctx</span>') + '</td>'
      + '<td class="mono">' + u.network_rel_outcomes + '</td>'
      + '<td>' + listCell(u.active_loops) + '</td>'
      + '<td>' + listCell(u.recent_outcomes) + '</td>'
      + '<td style="max-width:220px"><div style="font-size:12px;font-weight:600">' + esc(ra.recommended_action || '-') + '</div>'
        + '<div class="dim" style="font-size:11px">' + esc(ra.primary_blocker || '') + '</div>'
        + '<div class="dim" style="font-size:11px">' + esc(ra.reason || '') + '</div></td>'
      + '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

// VALUE ENGINE
function renderCandidates(d) {
  var rows = d.candidates || [];
  var html = '<h1>Value Engine</h1>'
    + '<div class="card-delta" style="margin-bottom:16px">' + rows.length + ' candidates (last 100)</div>'
    + '<div class="tbl-wrap"><table>'
    + '<thead><tr><th>User</th><th>Score</th><th>Status</th><th>Channel</th><th>Source</th><th>Text</th><th>Rationale</th><th>Created</th></tr></thead><tbody>';
  rows.forEach(function(c) {
    var score = c.score || 0;
    var scoreSt = score >= 8 ? "positive" : score >= 5 ? "caution" : "critical";
    var statusSt = c.status === "sent" ? "positive" : c.status === "pending" ? "caution" : "neutral";
    html += '<tr>'
      + '<td>' + esc(c.user_name || c.user_id.slice(0,8))
        + (c.user_tag ? ' <span style="color:var(--text3);font-size:11px">' + esc(c.user_tag) + '</span>' : '')
        + '</td>'
      + '<td>' + dot(scoreSt, String(score)) + '</td>'
      + '<td>' + dot(statusSt, c.status) + '</td>'
      + '<td class="mono">' + esc(c.channel) + '</td>'
      + '<td class="mono">' + esc(c.source) + '</td>'
      + '<td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(c.text) + '</td>'
      + '<td class="dim" style="max-width:180px">' + esc(c.rationale) + '</td>'
      + '<td class="dim">' + relTime(c.created_at) + '</td>'
      + '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

// REPORTS
function renderReports(d) {
  var rows = d.reports || [];
  var html = '<h1>Reports</h1>'
    + '<div class="tbl-wrap"><table>'
    + '<thead><tr><th>Reporter</th><th>Message</th><th>Reason</th><th>Status</th><th>Filed</th><th>Action</th></tr></thead><tbody>';
  rows.forEach(function(r) {
    var statusSt = r.status === "resolved" ? "positive" : "critical";
    var resolveBtn = r.status !== "resolved"
      ? '<button class="btn btn-primary" onclick="resolveReport(' + "'" + esc(r.id) + "'" + ')">Resolve</button>'
      : '';
    html += '<tr id="report-' + esc(r.id) + '">'
      + '<td class="mono">' + esc(r.reporter_phone) + '</td>'
      + '<td style="max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(r.message_text) + '</td>'
      + '<td>' + esc(r.reason) + '</td>'
      + '<td>' + dot(statusSt, r.status) + '</td>'
      + '<td class="dim">' + relTime(r.created_at) + '</td>'
      + '<td>' + resolveBtn + '</td>'
      + '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

async function resolveReport(id) {
  try {
    await apiFetch({ section: "reports" }, { method: "POST", body: { id: id, action: "resolve" } });
    loadSection("reports");
  } catch(e) {
    alert("Error: " + e.message);
  }
}

// HEALTH
function renderHealth(d) {
  var rows = d.health || [];
  var html = '<h1>Doubles health</h1>'
    + '<div class="tbl-wrap"><table>'
    + '<thead><tr><th>Name</th><th>Phone</th><th>Memories</th><th>Last reflect</th><th>Last D2D</th><th>Pending Q</th><th>Candidates 7d</th><th>Max score</th></tr></thead><tbody>';
  rows.forEach(function(r) {
    var pendingSt = r.pending_question ? "caution" : "neutral";
    var memSt = r.memories_count > 10 ? "positive" : r.memories_count > 3 ? "caution" : "critical";
    html += '<tr>'
      + '<td>' + esc(r.name) + '</td>'
      + '<td class="mono">' + esc(r.phone) + '</td>'
      + '<td>' + dot(memSt, String(r.memories_count)) + '</td>'
      + '<td class="dim">' + relTime(r.last_reflect) + '</td>'
      + '<td class="dim">' + relTime(r.last_d2d) + '</td>'
      + '<td>' + dot(pendingSt, r.pending_question ? "yes" : "no") + '</td>'
      + '<td class="mono">' + r.candidates_7d + '</td>'
      + '<td class="mono">' + (r.candidates_max_score != null ? r.candidates_max_score : '-') + '</td>'
      + '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

// CONVERSATIONS
var memFilters = { user: "", kind: "", q: "" };
function setMemFilter(k, v) { memFilters[k] = v; loadSection("memories"); }

function funnelTable(title, env) {
  if (!env || !env.ok) return "<h3>" + esc(title) + '</h3><div class="notice err">Source error (' + esc(env && env.error || "?") + ")</div>";
  var d = env.data || {};
  var rows = (d.steps || []).map(function(st) {
    return "<tr><td>" + esc(st.name) + "</td><td>" + esc(String(st.users)) + "</td><td>" +
      esc(String(st.conv_pct)) + "%</td><td>" +
      (st.median_hours_from_prev == null ? "—" : esc(String(st.median_hours_from_prev)) + "h") + "</td></tr>";
  }).join("");
  return "<h3>" + esc(title) + " <span class=muted>(n=" + esc(String(d.cohort_size)) + ")</span></h3>" +
    '<table><thead><tr><th>Step</th><th>Users</th><th>Conv</th><th>Median od poprz.</th></tr></thead><tbody>' + rows + "</tbody></table>";
}
function renderFunnels(d) {
  return "<h2>Funnels</h2>" +
    funnelTable("Activation (signup → wymiana → aha → outcome)", d.activation) +
    funnelTable("Invite (sent → joined → shared outcome)", d.invite) +
    funnelTable("Loops (opened → realized)", d.loops);
}

function renderMemories(d) {
  var userOpts = ['<option value="">— wybierz usera —</option>'].concat((d.users || []).map(function(u) {
    return '<option value="' + esc(u.id) + '"' + (u.id === memFilters.user ? " selected" : "") + '>' +
      esc(u.name || u.phone_number || u.id.slice(0, 8)) + "</option>";
  })).join("");
  var kinds = ["", "fact", "insight", "d2d_learning", "thread_learning"];
  var kindOpts = kinds.map(function(k) {
    return '<option value="' + k + '"' + (k === memFilters.kind ? " selected" : "") + '>' + (k || "all kinds") + "</option>";
  }).join("");
  var rows = (d.memories || []).map(function(m) {
    return "<tr><td><code>" + esc(m.kind) + "</code></td><td>" + esc(m.text) + "</td><td>" +
      esc(String(m.importance)) + "</td><td>" + esc(m.sensitivity) + "</td><td>" +
      (m.source_user_id ? "od: " + esc(m.source_user_id.slice(0, 8)) : "—") + "</td><td><span class=muted>" +
      esc((m.created_at || "").slice(0, 10)) + "</span></td></tr>";
  }).join("");
  return "<h2>Memory (czego Double si\u0119 uczy)</h2>" +
    '<div class="notice">Ka\u017cdy odczyt jest logowany (black-box).</div>' +
    '<p><select onchange="setMemFilter(\'user\', this.value)">' + userOpts + "</select> " +
    '<select onchange="setMemFilter(\'kind\', this.value)">' + kindOpts + "</select> " +
    '<input placeholder="szukaj\u2026" value="' + esc(memFilters.q) + '" onchange="setMemFilter(\'q\', this.value)"></p>' +
    (memFilters.user
      ? '<table><thead><tr><th>Kind</th><th>Text</th><th>Imp</th><th>Sens</th><th>Provenance</th><th>Created</th></tr></thead><tbody>' +
        (rows || "<tr><td colspan=6>brak</td></tr>") + "</tbody></table>"
      : "<p class=muted>Wybierz usera.</p>");
}

function perspCell(v) {
  if (!v) return '<span class=muted>brak</span>';
  return esc(v.kind || "?") + " · " + esc(v.openness || "?") + " · conf " + esc(String(v.confidence == null ? "?" : v.confidence)) +
    (v.confirm_status ? " · " + esc(v.confirm_status) : "");
}
function renderRelationships(d) {
  var rows = (d.pairs || []).map(function(p) {
    return "<tr><td>" + esc(p.a_name) + " × " + esc(p.b_name) + "</td><td>" + esc(p.kind || "—") + "</td><td>" +
      perspCell(p.a_view) + "</td><td>" + perspCell(p.b_view) + "</td><td>" +
      (p.muted_by_a || p.muted_by_b ? "muted" : "—") + "</td><td>" +
      (p.matched_at ? esc(p.matched_at.slice(0, 10)) : "—") + "</td><td>" +
      (p.last_outcome_at ? esc(p.last_outcome_at.slice(0, 10)) : "—") + "</td></tr>";
  }).join("");
  return "<h2>Relationships (ADM-11)</h2>" +
    '<table><thead><tr><th>Para</th><th>Pair kind</th><th>Perspektywa A</th><th>Perspektywa B</th><th>Mute</th><th>Matched</th><th>Ostatni outcome</th></tr></thead><tbody>' +
    (rows || "<tr><td colspan=7>brak par</td></tr>") + "</tbody></table>";
}

var runsFilter = "";
function setRunsFilter(v) { runsFilter = v; loadSection("runs"); }
function renderRuns(d) {
  var maxDur = Math.max.apply(null, (d.runs || []).map(function(r){ return r.duration_ms || 1; }).concat([1]));
  var opts = ['<option value="">all functions</option>'].concat((d.functions || []).map(function(f){
    return '<option value="' + esc(f) + '"' + (f === runsFilter ? " selected" : "") + '>' + esc(f) + '</option>';
  })).join("");
  var rows = (d.runs || []).map(function(r) {
    var bar = Math.max(2, Math.round(100 * (r.duration_ms || 0) / maxDur));
    return "<tr><td><code>" + esc(r.function_name) + "</code></td><td>" +
      esc((r.started_at || "").slice(5, 16).replace("T", " ")) + "</td><td>" +
      '<div style="background:#DCEFEA;height:10px;width:' + bar + 'px;display:inline-block;border-radius:3px"></div> ' +
      esc(String(r.duration_ms)) + "ms</td><td>" + esc(String(r.users_touched)) + "</td><td>" +
      esc(String(r.llm_calls)) + " / " + esc(String(r.est_tokens)) + ' <span class=muted>est.</span></td><td>' +
      (r.errors_count ? '<b style="color:#A04A34">' + r.errors_count + "</b>" : "0") + "</td><td><span class=muted>" +
      esc(JSON.stringify(r.summary)) + "</span></td></tr>";
  }).join("");
  return '<h2>Automation runs</h2>' +
    '<p><select onchange="setRunsFilter(this.value)">' + opts + "</select></p>" +
    '<table><thead><tr><th>Function</th><th>Started</th><th>Duration</th><th>Users</th><th>LLM calls / tokens</th><th>Errors</th><th>Summary</th></tr></thead><tbody>' +
    (rows || '<tr><td colspan=7>no runs yet</td></tr>') + "</tbody></table>";
}

function renderConfig(d) {
  var rows = (d.config || []).map(function(c) {
    var val = JSON.stringify(c.value);
    var input = c.value_type === "boolean"
      ? '<select id="cfg-' + esc(c.key) + '"><option value="true"' + (c.value === true ? " selected" : "") + '>true</option><option value="false"' + (c.value === false ? " selected" : "") + '>false</option></select>'
      : '<input id="cfg-' + esc(c.key) + '" type="number" step="any" value="' + esc(String(c.value)) + '" style="width:110px">';
    return "<tr><td><code>" + esc(c.key) + "</code></td><td>" + input +
      ' <button onclick="saveConfig(\'' + esc(c.key) + '\',\'' + esc(c.value_type) + '\')">Save</button></td><td>' +
      esc(c.description) + "</td><td>" + esc(c.updated_by) + "<br><span class=muted>" +
      esc((c.updated_at || "").slice(0, 16).replace("T", " ")) + "</span></td></tr>";
  }).join("");
  var hist = (d.history || []).map(function(h) {
    return "<tr><td>" + esc((h.changed_at || "").slice(0, 16).replace("T", " ")) + "</td><td><code>" +
      esc(h.key) + "</code></td><td>" + esc(JSON.stringify(h.old_value)) + " &rarr; " +
      esc(JSON.stringify(h.new_value)) + "</td><td>" + esc(h.changed_by) + "</td></tr>";
  }).join("");
  return '<h2>Engine tuning</h2>' +
    '<div class="notice">Zmiana ga\u0142ki dzia\u0142a w \u226460s (cache config w funkcjach). Warto\u015bci = \u017cywe zachowanie silnika.</div>' +
    '<table><thead><tr><th>Key</th><th>Value</th><th>Description</th><th>Updated</th></tr></thead><tbody>' +
    (rows || '<tr><td colspan=4>empty</td></tr>') + "</tbody></table>" +
    "<h3>History (50)</h3>" +
    '<table><thead><tr><th>When</th><th>Key</th><th>Change</th><th>By</th></tr></thead><tbody>' +
    (hist || '<tr><td colspan=4>none yet</td></tr>') + "</tbody></table>";
}

async function saveConfig(key, valueType) {
  var el = document.getElementById("cfg-" + key);
  if (!el) return;
  var value = valueType === "boolean" ? el.value === "true" : Number(el.value);
  if (valueType === "number" && !isFinite(value)) { alert("Not a number"); return; }
  if (!confirm("Set " + key + " = " + value + "?")) return;
  try {
    await apiFetch({ section: "config" }, { method: "POST", body: { key: key, value: value } });
    loadSection("config");
  } catch(e) { alert("Error: " + e.message); }
}

function renderConversations(d) {
  var rows = d.conversations || [];
  var html = '<h1>Conversations</h1>'
    + '<div class="tbl-wrap"><table>'
    + '<thead><tr><th>User A</th><th>User B</th><th>A turns</th><th>B turns</th><th>Digests</th><th>Status</th><th>Created</th><th></th></tr></thead><tbody>';
  rows.forEach(function(c) {
    var digestSt = c.has_digests ? "positive" : "neutral";
    html += '<tr>'
      + '<td>' + esc(c.user_a_name) + '</td>'
      + '<td>' + esc(c.user_b_name) + '</td>'
      + '<td class="mono">' + c.user_a_turns + '</td>'
      + '<td class="mono">' + c.user_b_turns + '</td>'
      + '<td>' + dot(digestSt, c.has_digests ? "yes" : "no") + '</td>'
      + '<td class="mono">' + esc(c.status) + '</td>'
      + '<td class="dim">' + relTime(c.created_at) + '</td>'
      + '<td><button class="btn btn-ghost" onclick="loadTranscript(' + "'" + esc(c.id) + "'" + ')">View</button></td>'
      + '</tr>';
  });
  html += '</tbody></table></div><div id="transcript-panel"></div>';
  return html;
}

async function loadTranscript(id) {
  var panel = document.getElementById("transcript-panel");
  if (!panel) return;
  panel.innerHTML = '<div class="loading">Loading transcript...</div>';
  try {
    var data = await apiFetch({ section: "conversations", transcript: id });
    var msgs = data.transcript || [];
    var html = '<h2 style="margin-top:24px">Transcript</h2><div class="tbl-wrap" style="padding:16px">';
    msgs.forEach(function(m) {
      html += '<div class="msg-row">'
        + '<div class="msg-speaker">' + esc(m.speaker) + ' &middot; turn ' + m.turn + '</div>'
        + '<div class="msg-text">' + esc(m.text) + '</div>'
        + '</div>';
    });
    html += '</div>';
    panel.innerHTML = html;
  } catch(e) {
    panel.innerHTML = '<div class="notice err">Error: ' + esc(e.message) + '</div>';
  }
}

init();
</script>
